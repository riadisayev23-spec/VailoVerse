<!DOCTYPE html>
<html>
<head>
  <title>Celebrity Imposter</title>
</head>
<body style="background:rgb(0, 0, 0); color:white; text-align:center; padding-top:100px;">

  <h1> Celebrity Imposter Mode</h1>
  <p>Are ready for an intense game</p>

  <a href="index.html">
    <button>⬅ Back</button>
  </a>

</body>
</html>
<body class="game-page">

  <h1>Celebrity Imposter Mode</h1>

  <p>Guess the imposter before time runs out.</p>

  <div id="setup">

    <input id="players"
           type="number"
           placeholder="How many players?"
           min="3">

    <input id="minutes"
           type="number"
           placeholder="Timer minutes"
           min="1">

    <button onclick="startGame('celebrity')">
      Start Game
    </button>

  </div>

  <div id="reveal" style="display:none;">

    <h2 id="playerText"></h2>

    <button id="showBtn"
            onclick="showWord()">
      Show Word
    </button>

    <h1 id="wordText"></h1>

    <button id="nextBtn"
            onclick="nextPlayer()"
            style="display:none;">
      Next Player
    </button>

  </div>

  <div id="timerBox" style="display:none;">

    <h2>Discussion Time</h2>

    <h1 id="timer">00:00</h1>

    <button onclick="startTimer()">
      Start Timer
    </button>

  </div>

  <div id="voteBox" style="display:none;">

    <h2>Vote The Imposter</h2>

    <div id="votes"></div>

    <h2 id="result"></h2>

    <button onclick="location.reload()">
      Play Again
    </button>

  </div>

  <br><br>

  <a href="index.html">
    <button>Back</button>
  </a>

  <script src="script.js"></script>

</body>
