<!DOCTYPE html>
<html>
<head>
  <title>Football Imposter</title>
</head>
<body style="background:black; color:white; text-align:center; padding-top:100px;">

  <h1> Football Imposter Mode</h1>
  <p>Are you ready for an intense game.</p>

  <a href="index.html">
    <button>⬅ Back</button>
  </a>

</body>
</html>
<div id="setup">
  <input id="players" type="number" placeholder="Players">
  <input id="minutes" type="number" placeholder="Minutes">

  <button onclick="startGame('football')">
    Start Game
  </button>
</div>

<div id="reveal" style="display:none;">
  <h2 id="playerText"></h2>

  <button id="showBtn" onclick="showWord()">
    Show Word
  </button>

  <h1 id="wordText"></h1>

  <button id="nextBtn"
          onclick="nextPlayer()"
          style="display:none;">
    Next Player
  </button>
</div>

<div id="timerBox" style="display:none;">
  <h1 id="timer">00:00</h1>

  <button onclick="startTimer()">
    Start Timer
  </button>
</div>

<div id="voteBox" style="display:none;">
  <div id="votes"></div>

  <h2 id="result"></h2>
</div>

<script src="script.js"></script>
